<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автозаполнение заказа из фото</title>
    <!-- Подключаем библиотеку Tesseract.js через CDN -->
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js'></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 0 20px; }
        .container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        button:disabled { background: #ccc; }
        #status { margin-top: 10px; font-style: italic; color: #666; }
        .preview { max-width: 100%; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 Скан заказа</h2>
    <p>Загрузите фото накладной или документа, и данные заполнятся автоматически.</p>

    <div class="form-group">
        <label>1. Загрузите фото:</label>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div id="status">Ожидание файла...</div>
    <img id="imagePreview" class="preview" alt="Предпросмотр">

    <hr>

    <h3>Данные заказа</h3>
    <form id="orderForm">
        <div class="form-group">
            <label for="orderNumber">Номер заказа:</label>
            <input type="text" id="orderNumber" placeholder="Например: 12345">
        </div>

        <div class="form-group">
            <label for="size">Размер (Ширина/Высота):</label>
            <input type="text" id="size" placeholder="Например: 1000х500">
        </div>

        <div class="form-group">
            <label for="material">Материал:</label>
            <input type="text" id="material" placeholder="Например: Бумага">
        </div>
        
        <div class="form-group">
            <label for="quantity">Количество:</label>
            <input type="text" id="quantity" placeholder="Например: 100 шт">
        </div>
    </form>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const statusDiv = document.getElementById('status');
    const imagePreview = document.getElementById('imagePreview');

    // Поля, куда будем вставлять данные
    const fields = {
        orderNumber: document.getElementById('orderNumber'),
        size: document.getElementById('size'),
        material: document.getElementById('material'),
        quantity: document.getElementById('quantity')
    };

    imageInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Показываем превью
        imagePreview.src = URL.createObjectURL(file);
        imagePreview.style.display = 'block';
        statusDiv.innerText = 'Начинаю распознавание текста...';

        try {
            // 1. Запускаем Tesseract (распознавание)
            // lang: 'rus+eng' - распознает и русский, и английский
            const { data: { text } } = await Tesseract.recognize(
                file,
                'rus+eng',
                { logger: m => statusDiv.innerText = `Прогресс: ${(m.progress * 100).toFixed(0)}%` }
            );

            statusDiv.innerText = 'Распознавание завершено. Анализирую данные...';
            console.log("Полный текст:", text); // Можно посмотреть в консоли браузера (F12)

            // 2. Парсим текст и ищем данные
            parseData(text);

            statusDiv.innerText = 'Готово! Проверьте поля.';
        } catch (err) {
            console.error(err);
            statusDiv.innerText = 'Ошибка при распознавании.';
        }
    });

    function parseData(text) {
        // Разбиваем текст на строки для удобства поиска
        const lines = text.split('\n');

        // --- ЛОГИКА ПОИСКА НОМЕРА ЗАКАЗА ---
        // Ищем строку, где есть слово "Заказ" или "№", и рядом цифры
        const orderLine = lines.find(line => /заказ|order|№/i.test(line));
        if (orderLine) {
            // Вытаскиваем все цифры из этой строки
            const numbers = orderLine.match(/\d+/g);
            if (numbers) fields.orderNumber.value = numbers.join(' '); 
        }

        // --- ЛОГИКА ПОИСКА РАЗМЕРОВ ---
        // Ищем паттерн типа 1000x500 или 1000*500 или 1000 на 500
        // Регулярка ищет: Цифры + (x, X, *, х) + Цифры
        const sizeMatch = text.match(/(\d{2,4})\s*[xX*х]\s*(\d{2,4})/i);
        if (sizeMatch) {
            fields.size.value = `${sizeMatch[1]}x${sizeMatch[2]}`;
        }

        // --- ЛОГИКА ПОИСКА МАТЕРИАЛА (Пример по ключевым словам) ---
        // Если в тексте есть слово "бумага", "пластик" и т.д.
        const materials = ['бумага', 'пластик', 'металл', 'пвх', 'paper', 'plastic'];
        const foundMaterial = materials.find(mat => text.toLowerCase().includes(mat));
        if (foundMaterial) fields.material.value = foundMaterial;

        // --- ЛОГИКА ПОИСКА КОЛИЧЕСТВА ---
        // Ищем строки со словом "шт" или "количество"
        const qtyLine = lines.find(line => /шт|количество|qty/i.test(line));
        if (qtyLine) {
            const qtyNumbers = qtyLine.match(/\d+/g);
            if (qtyNumbers) fields.quantity.value = qtyNumbers[0]; // Берем первое число
        }
    }
</script>

</body>
</html>
