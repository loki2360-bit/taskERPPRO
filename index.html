<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avito Keyword Collector (No-DB)</title>
    <style>
        :root { --primary: #00AAFF; --bg: #f0f2f5; --card: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: var(--primary); }
        
        .search-box { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex-grow: 1; padding: 15px; border: 2px solid #e1e1e1; border-radius: 8px; font-size: 16px; }
        button { padding: 15px 25px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; background: var(--primary); color: white; }
        button:disabled { background: #ccc; }
        
        .results-area { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: none; }
        .keywords-list { list-style: none; padding: 0; }
        .keyword-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .keyword-item:hover { background: #f9f9f9; }
        
        .loader, .error { text-align: center; padding: 20px; display: none; }
        .error { color: red; background: #ffe6e6; border-radius: 8px; }
        .actions { margin-top: 15px; display: flex; gap: 10px; }
        .btn-secondary { background: #28a745; }
        .btn-info { background: #17a2b8; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔑 Сбор ключевых слов Avito</h1>
    
    <div class="search-box">
        <input type="text" id="query" placeholder="Введите слово (например: ковер)" onkeypress="if(event.key==='Enter') fetchSuggestions()">
        <button id="searchBtn" onclick="fetchSuggestions()">Найти</button>
    </div>

    <div id="loader" class="loader">Загрузка... (перебор прокси)</div>
    <div id="error" class="error"></div>

    <div class="results-area" id="resultsArea">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <span id="countInfo">Найдено: 0</span>
            <div class="actions">
                <button class="btn-secondary" onclick="copyToClipboard()" style="padding:8px 15px; font-size:14px;">Копировать</button>
                <button class="btn-info" onclick="downloadCSV()" style="padding:8px 15px; font-size:14px;">CSV</button>
            </div>
        </div>
        <ul class="keywords-list" id="keywordsList"></ul>
    </div>
</div>

<script>
    let currentKeywords = [];
    
    // Список рабочих прокси. Если один упадет, пробуем следующий.
    const PROXIES = [
        'https://api.allorigins.win/get?url=',
        'https://corsproxy.io/?',
        'https://api.codetabs.com/v1/proxy?quest='
    ];

    async function fetchSuggestions() {
        const query = document.getElementById('query').value.trim();
        if (!query) return;

        const loader = document.getElementById('loader');
        const errorDiv = document.getElementById('error');
        const resultsArea = document.getElementById('resultsArea');
        const list = document.getElementById('keywordsList');
        
        loader.style.display = 'block';
        errorDiv.style.display = 'none';
        resultsArea.style.display = 'none';
        list.innerHTML = '';
        currentKeywords = [];

        const apiUrl = `https://www.avito.ru/api/1/suggestions?part=${encodeURIComponent(query)}&limit=30`;
        let success = false;

        // Пробуем прокси по очереди
        for (const proxy of PROXIES) {
            try {
                const response = await fetch(proxy + encodeURIComponent(apiUrl));
                if (!response.ok) continue;
                
                const data = await response.json();
                // Разные прокси возвращают данные по-разному, нормализуем
                const content = data.contents || data.body || data; 
                const avitoData = typeof content === 'string' ? JSON.parse(content) : content;

                if (avitoData && avitoData.suggestions) {
                    processSuggestions(avitoData.suggestions);
                    success = true;
                    break; // Успех, выходим из цикла
                }
            } catch (e) {
                console.log(`Proxy ${proxy} failed, trying next...`);
                continue;
            }
        }

        loader.style.display = 'none';
        if (success) {
            resultsArea.style.display = 'block';
            document.getElementById('countInfo').innerText = `Найдено: ${currentKeywords.length}`;
        } else {
            errorDiv.style.display = 'block';
            errorDiv.innerText = 'Не удалось получить данные. Все прокси недоступны или Авито блокирует запросы.';
        }
    }

    function processSuggestions(suggestions) {
        const list = document.getElementById('keywordsList');
        suggestions.forEach(item => {
            currentKeywords.push(item.value);
            const li = document.createElement('li');
            li.className = 'keyword-item';
            li.innerText = item.value;
            li.onclick = () => {
                navigator.clipboard.writeText(item.value);
                alert('Скопировано: ' + item.value);
            };
            list.appendChild(li);
        });
    }

    function copyToClipboard() {
        navigator.clipboard.writeText(currentKeywords.join('\n'));
        alert('Список скопирован!');
    }

    function downloadCSV() {
        let csv = "\uFEFFНазвание\n" + currentKeywords.map(k => `"${k}"`).join('\n');
        const link = document.createElement("a");
        link.href = encodeURI(csv);
        link.download = "avito_keywords.csv";
        link.click();
    }
</script>

</body>
</html>
