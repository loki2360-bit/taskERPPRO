<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avito Keyword Collector</title>
    <style>
        :root {
            --primary: #00AAFF;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #333;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; }

        /* Форма */
        .search-box { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex-grow: 1; padding: 15px; border: 2px solid #e1e1e1; border-radius: 8px; font-size: 16px; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--primary); }
        
        button { padding: 15px 25px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        .btn-search { background: var(--primary); color: white; }
        .btn-copy { background: #28a745; color: white; margin-top: 10px; display: none; }
        .btn-download { background: #17a2b8; color: white; margin-top: 10px; margin-left: 10px; display: none; }
        
        button:hover { opacity: 0.9; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* Список запросов */
        .results-area { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); min-height: 200px; }
        .stats { font-size: 14px; color: #666; margin-bottom: 15px; display: flex; justify-content: space-between; }
        
        .keywords-list { list-style: none; padding: 0; margin: 0; }
        .keyword-item { 
            padding: 12px 15px; 
            border-bottom: 1px solid #f0f0f0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .keyword-item:last-child { border-bottom: none; }
        .keyword-item:hover { background: #f9f9f9; }
        .keyword-text { font-size: 16px; }
        .keyword-count { font-size: 12px; color: #999; background: #eee; padding: 2px 6px; border-radius: 4px; }

        .loader { text-align: center; padding: 40px; display: none; color: #666; }
        .error { color: #dc3545; text-align: center; padding: 20px; background: #ffe6e6; border-radius: 8px; display: none; }
        
        .actions { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔑 Сбор ключевых слов Avito</h1>
    
    <div class="search-box">
        <input type="text" id="query" placeholder="Введите слово (например: ковер)" onkeypress="handleEnter(event)">
        <button id="searchBtn" class="btn-search" onclick="fetchSuggestions()">Найти запросы</button>
    </div>

    <div id="loader" class="loader">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00AAFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="animate-spin">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
        </svg>
        <p>Опрашиваем API Авито...</p>
    </div>

    <div id="error" class="error"></div>

    <div class="results-area" id="resultsArea" style="display:none;">
        <div class="stats">
            <span id="countInfo">Найдено фраз: 0</span>
            <div class="actions">
                <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">Копировать список</button>
                <button class="btn-download" id="downloadBtn" onclick="downloadCSV()">Скачать CSV</button>
            </div>
        </div>
        <ul class="keywords-list" id="keywordsList"></ul>
    </div>
</div>

<script>
    let currentKeywords = [];

    function handleEnter(e) {
        if (e.key === 'Enter') fetchSuggestions();
    }

    async function fetchSuggestions() {
        const query = document.getElementById('query').value.trim();
        const resultsArea = document.getElementById('resultsArea');
        const loader = document.getElementById('loader');
        const errorDiv = document.getElementById('error');
        const list = document.getElementById('keywordsList');
        const copyBtn = document.getElementById('copyBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const countInfo = document.getElementById('countInfo');

        if (!query) return;

        // Сброс
        list.innerHTML = '';
        errorDiv.style.display = 'none';
        resultsArea.style.display = 'none';
        copyBtn.style.display = 'none';
        downloadBtn.style.display = 'none';
        loader.style.display = 'block';
        currentKeywords = [];

        // API подсказок Авито
        // part - часть слова, limit - лимит выдачи (макс обычно 20-30)
        const apiUrl = `https://www.avito.ru/api/1/suggestions?part=${encodeURIComponent(query)}&limit=30`;
        
        // Используем прокси для обхода CORS
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;

        try {
            const response = await fetch(proxyUrl);
            const data = await response.json();

            if (!response.ok) throw new Error('Ошибка сети');
            
            // Парсим ответ от Авито
            // Ответ приходит в виде строки внутри data.contents, которую нужно распарсить как JSON
            const avitoData = JSON.parse(data.contents);

            if (avitoData && avitoData.suggestions) {
                processSuggestions(avitoData.suggestions);
                resultsArea.style.display = 'block';
                copyBtn.style.display = 'block';
                downloadBtn.style.display = 'block';
            } else {
                throw new Error('Авито не вернул подсказок. Возможно, слово слишком редкое.');
            }

        } catch (err) {
            console.error(err);
            errorDiv.innerText = `Ошибка: ${err.message}. Попробуйте другое слово.`;
            errorDiv.style.display = 'block';
        } finally {
            loader.style.display = 'none';
        }
    }

    function processSuggestions(suggestions) {
        const list = document.getElementById('keywordsList');
        const countInfo = document.getElementById('countInfo');

        suggestions.forEach(item => {
            // item.value - это сам текст запроса
            // item.popularity - иногда бывает, но не всегда
            const text = item.value;
            currentKeywords.push(text);

            const li = document.createElement('li');
            li.className = 'keyword-item';
            li.onclick = () => {
                // При клике копируем конкретную фразу
                navigator.clipboard.writeText(text);
                alert(`Скопировано: ${text}`);
            };
            
            li.innerHTML = `
                <span class="keyword-text">${highlightMatch(text, document.getElementById('query').value)}</span>
            `;
            list.appendChild(li);
        });

        countInfo.innerText = `Найдено фраз: ${currentKeywords.length}`;
    }

    // Подсветка введенного слова в результатах
    function highlightMatch(text, query) {
        const regex = new RegExp(`(${query})`, 'gi');
        return text.replace(regex, '<b>$1</b>');
    }

    function copyToClipboard() {
        if (currentKeywords.length === 0) return;
        const text = currentKeywords.join('\n');
        navigator.clipboard.writeText(text).then(() => {
            alert('Все фразы скопированы в буфер обмена!');
        });
    }

    function downloadCSV() {
        if (currentKeywords.length === 0) return;
        
        let csvContent = "text/csv;charset=utf-8,\uFEFF";
        csvContent += "Ключевая фраза\n";
        
        currentKeywords.forEach(row => {
            csvContent += `"${row.replace(/"/g, '""')}"\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `avito_keywords_${document.getElementById('query').value}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
