<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Точный сканер документов</title>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js'></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 0 20px; background: #f5f5f5; }
        .container { background: white; border: 1px solid #ddd; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #555; font-size: 0.9em; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        input:focus { border-color: #007bff; outline: none; }
        
        button { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        #status { margin-top: 15px; font-size: 0.9em; color: #666; background: #eee; padding: 10px; border-radius: 6px; }
        .preview-container { margin-top: 15px; text-align: center; }
        .preview-container img { max-width: 100%; border-radius: 6px; border: 1px solid #ddd; display: none; }
        .tips { font-size: 0.85em; color: #888; margin-top: 5px; background: #fff8e1; padding: 10px; border-radius: 6px; border-left: 4px solid #ffc107; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 Умный сканер заказа</h2>
    
    <div class="tips">
        💡 <strong>Совет для точности:</strong> Делайте фото при хорошем свете, строго сверху. Избегайте теней и бликов.
    </div>

    <div class="form-group" style="margin-top: 20px;">
        <label>1. Загрузите фото документа:</label>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div id="status">Ожидание файла...</div>
    
    <div class="preview-container">
        <p style="font-size: 0.8em; color: #999;">Обработанное изображение (для анализа):</p>
        <img id="imagePreview" alt="Предпросмотр">
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <h3>Результат</h3>
    <form id="orderForm">
        <div class="form-group">
            <label for="orderNumber">Номер заказа / Накладной:</label>
            <input type="text" id="orderNumber" placeholder="Например: 45892">
        </div>

        <div class="form-group">
            <label for="size">Размеры (ШхВ):</label>
            <input type="text" id="size" placeholder="Например: 1000x500">
        </div>

        <div class="form-group">
            <label for="material">Материал:</label>
            <input type="text" id="material" placeholder="Например: Баннер">
        </div>
        
        <div class="form-group">
            <label for="quantity">Тираж / Кол-во:</label>
            <input type="text" id="quantity" placeholder="Например: 50 шт">
        </div>
    </form>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const statusDiv = document.getElementById('status');
    const imagePreview = document.getElementById('imagePreview');

    const fields = {
        orderNumber: document.getElementById('orderNumber'),
        size: document.getElementById('size'),
        material: document.getElementById('material'),
        quantity: document.getElementById('quantity')
    };

    // Функция предобработки изображения (Улучшение контраста и Ч/Б)
    function preprocessImage(file) {
        return new Promise((resolve) => {
            const img = new Image();
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            img.onload = () => {
                // Устанавливаем размеры canvas равными изображению
                canvas.width = img.width;
                canvas.height = img.height;

                // 1. Рисуем изображение
                ctx.drawImage(img, 0, 0);

                // 2. Получаем данные пикселей
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                // 3. Применяем фильтр: Ч/Б + Высокий контраст (Пороговое значение)
                // Это превращает серые тени в чисто черный или чисто белый
                for (let i = 0; i < data.length; i += 4) {
                    // Формула яркости
                    const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                    
                    // Порог: если ярче 140 - делаем белым (255), иначе черным (0)
                    // Можно менять число 140 для настройки чувствительности
                    const val = avg > 140 ? 255 : 0; 

                    data[i] = val;     // Red
                    data[i + 1] = val; // Green
                    data[i + 2] = val; // Blue
                }

                ctx.putImageData(imageData, 0, 0);

                // Показываем обработанное фото пользователю
                imagePreview.src = canvas.toDataURL();
                imagePreview.style.display = 'block';

                resolve(canvas); // Возвращаем обработанный canvas
            };
            img.src = URL.createObjectURL(file);
        });
    }

    imageInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        statusDiv.innerText = '1. Обработка изображения (увеличение контраста)...';
        
        try {
            // Шаг 1: Предобработка
            const processedCanvas = await preprocessImage(file);

            statusDiv.innerText = '2. Распознавание текста (это может занять 5-10 сек)...';

            // Шаг 2: Настройка Tesseract для максимальной точности
            const worker = await Tesseract.createWorker({
                logger: m => {
                    if(m.status === 'recognizing text') {
                        statusDiv.innerText = `2. Распознавание: ${(m.progress * 100).toFixed(0)}%`;
                    }
                }
            });

            await worker.loadLanguage('rus+eng');
            await worker.initialize('rus+eng');
            
            // PSM 6 - Assume a single uniform block of text (лучше для документов)
            // PSM 11 - Sparse text (если текста мало)
            // Мы используем конфигурацию для улучшения точности цифр
            await worker.setParameters({
                tessedit_pageseg_mode: Tesseract.PSM.SINGLE_BLOCK, 
                tessedit_char_whitelist: '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ-/*xXхШштПВХбумагапластик', // Подсказываем движку, какие символы искать
            });

            const { data: { text } } = await worker.recognize(processedCanvas);
            
            await worker.terminate();

            statusDiv.innerText = '3. Анализ данных...';
            console.log("Распознанный текст:", text);
            
            parseData(text);

            statusDiv.innerText = '✅ Готово! Проверьте поля.';
            statusDiv.style.background = '#d4edda';
            statusDiv.style.color = '#155724';

        } catch (err) {
            console.error(err);
            statusDiv.innerText = '❌ Ошибка при обработке.';
            statusDiv.style.background = '#f8d7da';
            statusDiv.style.color = '#721c24';
        }
    });

    function parseData(text) {
        const lines = text.split('\n').filter(line => line.trim().length > 0);
        const fullText = text;

        // --- 1. НОМЕР ЗАКАЗА ---
        // Ищем строки с ключевыми словами
        const orderKeywords = ['заказ', 'номер', '№', 'order', 'nakladnaya', 'накладная'];
        let orderFound = false;
        
        for (let line of lines) {
            if (orderKeywords.some(k => line.toLowerCase().includes(k))) {
                // Ищем последовательность цифр (от 3 до 10 знаков)
                const numbers = line.match(/\d{3,10}/g);
                if (numbers && numbers.length > 0) {
                    fields.orderNumber.value = numbers[0]; // Берем первое найденное длинное число
                    orderFound = true;
                    break;
                }
            }
        }
        // Если не нашли по ключевым словам, ищем просто крупный номер в начале текста
        if (!orderFound) {
            const firstBigNumber = fullText.match(/^\d{4,8}/m);
            if (firstBigNumber) fields.orderNumber.value = firstBigNumber[0];
        }

        // --- 2. РАЗМЕРЫ ---
        // Ищем паттерн: Цифры + разделитель + Цифры
        // Разделители: x, X, *, х (кириллическая), space
        // Примеры: 1000x500, 1000*500, 1000 500
        const sizeRegex = /(\d{2,4})\s*[xX*х]\s*(\d{2,4})/i;
        const sizeMatch = fullText.match(sizeRegex);
        if (sizeMatch) {
            fields.size.value = `${sizeMatch[1]}x${sizeMatch[2]}`;
        } else {
            // Альтернатива: два числа рядом через пробел (часто бывает в прайсах)
            const spaceSize = fullText.match(/(\d{3,4})\s+(\d{3,4})/);
            if (spaceSize) fields.size.value = `${spaceSize[1]}x${spaceSize[2]}`;
        }

        // --- 3. МАТЕРИАЛ ---
        const materials = [
            'баннер', 'пвх', 'бумага', 'пластик', 'металл', 'холст', 'пленка', 'винил',
            'banner', 'pvc', 'paper', 'plastic', 'metal', 'canvas'
        ];
        const lowerText = fullText.toLowerCase();
        const foundMat = materials.find(m => lowerText.includes(m));
        if (foundMat) fields.material.value = foundMat;

        // --- 4. КОЛИЧЕСТВО ---
        // Ищем число рядом со словом "шт", "кол-во", "тираж"
        const qtyKeywords = ['шт', 'кол', 'тираж', 'qty', 'count'];
        for (let line of lines) {
            if (qtyKeywords.some(k => line.toLowerCase().includes(k))) {
                const nums = line.match(/\d+/g);
                if (nums) {
                    // Обычно количество - это число, которое не похоже на размер (не 1000, а например 50)
                    // Но для простоты берем первое число в строке
                    fields.quantity.value = nums[0]; 
                    break;
                }
            }
        }
    }
</script>

</body>
</html>
